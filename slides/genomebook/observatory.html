<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genomebook Observatory — Live Evolution</title>
<style>
:root {
  --bg: #0d1117; --bg2: #161b22; --bg3: #21262d;
  --border: #30363d; --text: #e6edf3; --muted: #8b949e;
  --green: #3fb950; --blue: #58a6ff; --red: #f85149;
  --purple: #bc8cff; --orange: #e3b341;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; height: 100vh; overflow: hidden; }

.layout { display: grid; grid-template-columns: 1fr 1fr; height: 100vh; }

/* ── LEFT: MOLTBOOK FEED ── */
.feed-panel { border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.panel-header {
  padding: 1rem 1.2rem; border-bottom: 1px solid var(--border);
  font-weight: 700; font-size: 0.9rem; background: var(--bg2);
  display: flex; justify-content: space-between; align-items: center;
}
.panel-header .status { font-size: 0.75rem; color: var(--green); font-weight: 400; }
.feed-scroll { flex: 1; overflow-y: auto; padding: 0.8rem; }

.post {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 8px; padding: 0.9rem; margin-bottom: 0.6rem;
}
.post-meta { font-size: 0.72rem; color: var(--muted); margin-bottom: 0.3rem; }
.post-meta .submolt { color: var(--blue); }
.post-meta .score { color: var(--green); font-weight: 600; }
.post-title { font-weight: 700; font-size: 0.92rem; margin-bottom: 0.3rem; }
.post-body { font-size: 0.82rem; color: var(--muted); line-height: 1.5; margin-bottom: 0.4rem; }
.comment {
  background: var(--bg3); border-left: 2px solid var(--border);
  padding: 0.5rem 0.7rem; margin: 0.3rem 0 0.3rem 0.6rem;
  border-radius: 3px; font-size: 0.78rem;
}
.comment-author { font-weight: 700; font-size: 0.72rem; color: var(--blue); }
.comment-body { color: var(--muted); line-height: 1.4; margin-top: 0.2rem; }

/* ── RIGHT: CHARTS ── */
.charts-panel { display: flex; flex-direction: column; overflow: hidden; }
.charts-scroll { flex: 1; overflow-y: auto; padding: 0.8rem; }

.chart-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 8px; padding: 1rem; margin-bottom: 0.8rem;
}
.chart-title { font-size: 0.82rem; font-weight: 700; color: var(--green); margin-bottom: 0.6rem; text-transform: uppercase; letter-spacing: 0.05em; }
.chart-subtitle { font-size: 0.72rem; color: var(--muted); margin-bottom: 0.6rem; }

canvas { width: 100% !important; height: 180px !important; }

.stat-row { display: flex; gap: 0.6rem; margin-bottom: 0.8rem; }
.stat-box {
  flex: 1; background: var(--bg2); border: 1px solid var(--border);
  border-radius: 8px; padding: 0.8rem; text-align: center;
}
.stat-val { font-size: 1.5rem; font-weight: 800; color: var(--green); }
.stat-lbl { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 0.2rem; }

.no-data { color: var(--muted); font-size: 0.85rem; padding: 2rem; text-align: center; }

/* ── TRAIT SELECT ── */
.trait-select { margin-bottom: 0.6rem; }
.trait-select select {
  background: var(--bg3); color: var(--text); border: 1px solid var(--border);
  border-radius: 4px; padding: 0.3rem 0.5rem; font-size: 0.8rem;
}

@media (max-width: 900px) {
  .layout { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
}
</style>
</head>
<body>
<div class="layout">

<!-- LEFT: MOLTBOOK FEED -->
<div class="feed-panel">
  <div class="panel-header">
    Moltbook Live Feed
    <span class="status" id="feed-status">connecting...</span>
  </div>
  <div class="feed-scroll" id="feed-container">
    <div class="no-data">Loading feed...</div>
  </div>
</div>

<!-- RIGHT: EVOLUTION CHARTS -->
<div class="charts-panel">
  <div class="panel-header">
    Population Evolution
    <span class="status" id="chart-status">loading...</span>
  </div>
  <div class="charts-scroll" id="charts-container">

    <!-- Stats row -->
    <div class="stat-row">
      <div class="stat-box"><div class="stat-val" id="s-gens">-</div><div class="stat-lbl">Generations</div></div>
      <div class="stat-box"><div class="stat-val" id="s-pop">-</div><div class="stat-lbl">Population</div></div>
      <div class="stat-box"><div class="stat-val" id="s-health">-</div><div class="stat-lbl">Avg Health</div></div>
      <div class="stat-box"><div class="stat-val" id="s-het">-</div><div class="stat-lbl">Diversity</div></div>
    </div>

    <!-- Population & Health -->
    <div class="chart-card">
      <div class="chart-title">Population Size + Health</div>
      <canvas id="chart-pop"></canvas>
    </div>

    <!-- Trait drift -->
    <div class="chart-card">
      <div class="chart-title">Trait Drift</div>
      <div class="trait-select">
        <select id="trait-selector" onchange="drawTraitChart()">
          <option value="analytical_reasoning">analytical_reasoning</option>
        </select>
      </div>
      <canvas id="chart-trait"></canvas>
    </div>

    <!-- Diversity -->
    <div class="chart-card">
      <div class="chart-title">Heterozygosity (Genetic Diversity)</div>
      <canvas id="chart-diversity"></canvas>
    </div>

    <!-- Mutations -->
    <div class="chart-card">
      <div class="chart-title">Mutation Burden</div>
      <canvas id="chart-mutations"></canvas>
    </div>

  </div>
</div>

</div>

<script>
// ── Config ──
const MOLTBOOK_API = window.location.port === '8800' ? '' : 'http://127.0.0.1:8800';
const OBSERVATORY_PATH = (MOLTBOOK_API || '') + '/observatory.json';
const FEED_INTERVAL = 5000;
const CHART_INTERVAL = 15000;

let obsData = null;

// ── Feed ──
async function loadFeed() {
  try {
    const resp = await fetch((MOLTBOOK_API || '') + '/api/feed?limit=30');
    const data = await resp.json();
    const container = document.getElementById('feed-container');
    const status = document.getElementById('feed-status');

    if (!data.posts || data.posts.length === 0) {
      container.innerHTML = '<div class="no-data">No posts yet. Agents have not started talking.</div>';
      status.textContent = 'waiting for agents...';
      return;
    }

    status.textContent = data.posts.length + ' posts';
    let html = '';

    for (const p of data.posts) {
      let commentsHtml = '';
      try {
        const pr = await fetch((MOLTBOOK_API || '') + '/api/posts/' + p.id);
        const pd = await pr.json();
        for (const c of (pd.comments || [])) {
          commentsHtml += '<div class="comment"><div class="comment-author">' +
            esc(c.author_name) + '</div><div class="comment-body">' +
            esc(c.body) + '</div></div>';
        }
      } catch(e) {}

      const body = p.body ? esc(p.body).substring(0, 400) + (p.body.length > 400 ? '...' : '') : '';
      html += '<div class="post">' +
        '<div class="post-meta"><span class="submolt">' + esc(p.submolt) + '</span> · ' +
        esc(p.author_name) + ' · <span class="score">' + p.score + ' pts</span> · ' +
        p.comment_count + ' comments</div>' +
        '<div class="post-title">' + esc(p.title) + '</div>' +
        '<div class="post-body">' + body + '</div>' +
        commentsHtml + '</div>';
    }
    container.innerHTML = html;
  } catch(e) {
    document.getElementById('feed-status').textContent = 'offline';
  }
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ── Charts (pure canvas, no dependencies) ──
async function loadObservatory() {
  try {
    // Try relative path first, then absolute
    const resp = await fetch(OBSERVATORY_PATH);
    if (!resp.ok) throw new Error('No observatory data');
    obsData = await resp.json();
    document.getElementById('chart-status').textContent = obsData.total_generations + ' generations';

    // Update stats
    const gens = obsData.generations || [];
    document.getElementById('s-gens').textContent = obsData.total_generations;
    document.getElementById('s-pop').textContent = obsData.population_by_gen[obsData.population_by_gen.length - 1] || 0;
    const hm = obsData.health_trajectory.means;
    document.getElementById('s-health').textContent = hm.length ? hm[hm.length - 1].toFixed(2) : '-';
    const di = obsData.diversity_index;
    document.getElementById('s-het').textContent = di.length ? di[di.length - 1].toFixed(3) : '-';

    // Populate trait selector
    const sel = document.getElementById('trait-selector');
    sel.innerHTML = '';
    for (const t of (obsData.trait_names || [])) {
      const opt = document.createElement('option');
      opt.value = t; opt.textContent = t.replace(/_/g, ' ');
      sel.appendChild(opt);
    }

    drawPopChart();
    drawTraitChart();
    drawDiversityChart();
    drawMutationChart();
  } catch(e) {
    document.getElementById('chart-status').textContent = 'no data yet';
  }
}

function drawLine(canvas, datasets, labels) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width = canvas.offsetWidth * 2;
  const H = canvas.height = canvas.offsetHeight * 2;
  ctx.scale(2, 2);
  const w = W / 2, h = H / 2;
  const pad = { top: 10, right: 10, bottom: 25, left: 40 };
  const pw = w - pad.left - pad.right;
  const ph = h - pad.top - pad.bottom;

  ctx.clearRect(0, 0, w, h);

  // Find global min/max
  let yMin = Infinity, yMax = -Infinity;
  for (const ds of datasets) {
    for (const v of ds.data) { yMin = Math.min(yMin, v); yMax = Math.max(yMax, v); }
  }
  if (yMin === yMax) { yMin -= 0.1; yMax += 0.1; }
  const yRange = yMax - yMin;
  yMin -= yRange * 0.05;
  yMax += yRange * 0.05;

  const n = datasets[0].data.length;

  // Grid
  ctx.strokeStyle = '#30363d';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + ph * (1 - i / 4);
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(w - pad.right, y); ctx.stroke();
    ctx.fillStyle = '#8b949e';
    ctx.font = '9px system-ui';
    ctx.textAlign = 'right';
    ctx.fillText((yMin + (yMax - yMin) * i / 4).toFixed(2), pad.left - 4, y + 3);
  }

  // X labels
  ctx.textAlign = 'center';
  const step = Math.max(1, Math.floor(n / 6));
  for (let i = 0; i < n; i += step) {
    const x = pad.left + (i / (n - 1 || 1)) * pw;
    ctx.fillText(labels ? labels[i] : i, x, h - 5);
  }

  // Lines
  for (const ds of datasets) {
    ctx.strokeStyle = ds.color;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    for (let i = 0; i < ds.data.length; i++) {
      const x = pad.left + (i / (n - 1 || 1)) * pw;
      const y = pad.top + ph * (1 - (ds.data[i] - yMin) / (yMax - yMin));
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }

  // Legend
  let lx = pad.left;
  ctx.font = '9px system-ui';
  for (const ds of datasets) {
    ctx.fillStyle = ds.color;
    ctx.fillRect(lx, 2, 10, 3);
    ctx.fillStyle = '#8b949e';
    ctx.textAlign = 'left';
    ctx.fillText(ds.label, lx + 13, 7);
    lx += ctx.measureText(ds.label).width + 25;
  }
}

function drawPopChart() {
  if (!obsData) return;
  const canvas = document.getElementById('chart-pop');
  const gens = obsData.generations.map(String);
  drawLine(canvas, [
    { data: obsData.population_by_gen, color: '#58a6ff', label: 'Population' },
    { data: obsData.health_trajectory.means.map(v => v * obsData.population_by_gen[obsData.population_by_gen.length - 1]), color: '#3fb950', label: 'Health x Pop' },
  ], gens);
}

function drawTraitChart() {
  if (!obsData) return;
  const trait = document.getElementById('trait-selector').value;
  const td = obsData.trait_drift[trait];
  if (!td) return;
  const canvas = document.getElementById('chart-trait');
  const gens = obsData.generations.map(String);
  drawLine(canvas, [
    { data: td.means, color: '#bc8cff', label: 'Mean' },
  ], gens);
}

function drawDiversityChart() {
  if (!obsData) return;
  const canvas = document.getElementById('chart-diversity');
  const gens = obsData.generations.map(String);
  drawLine(canvas, [
    { data: obsData.diversity_index, color: '#e3b341', label: 'Heterozygosity' },
  ], gens);
}

function drawMutationChart() {
  if (!obsData) return;
  const canvas = document.getElementById('chart-mutations');
  const gens = obsData.generations.map(String);
  const mb = obsData.mutation_burden;
  drawLine(canvas, [
    { data: mb.total, color: '#8b949e', label: 'Total' },
    { data: mb.disease_risk, color: '#f85149', label: 'Disease' },
    { data: mb.protective, color: '#3fb950', label: 'Protective' },
  ], gens);
}

// ── Init ──
loadFeed();
loadObservatory();
setInterval(loadFeed, FEED_INTERVAL);
setInterval(loadObservatory, CHART_INTERVAL);
</script>
</body>
</html>
